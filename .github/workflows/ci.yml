name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint and Type Check
      run: npm run lint

    - name: Run Tests
      run: npm test

    - name: Build Web App
      run: npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Build Android App
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.path }}
